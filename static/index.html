<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGE Battle — 1v1</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>EGE <span>Battle</span></h1>
            <p>1 на 1 — соревнование по ЕГЭ</p>
        </div>

        <!-- Auth Screen -->
        <div id="auth-screen" class="auth-box">
            <div class="tabs">
                <button class="tab active" id="tab-login" onclick="switchTab('login')">Вход</button>
                <button class="tab" id="tab-register" onclick="switchTab('register')">Регистрация</button>
            </div>
            <div id="error-msg" class="error-msg"></div>
            <input type="text" id="username" placeholder="Имя пользователя" autocomplete="off">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn btn-green" id="auth-btn" onclick="doAuth()">Войти</button>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard hidden">
            <div class="user-card">
                <div class="username" id="d-username"></div>
                <div class="rating" id="d-rating"></div>
                <div class="stats">
                    Игр: <span id="d-games">0</span> &nbsp;|&nbsp;
                    Побед: <span id="d-wins">0</span>
                </div>
            </div>
            <div class="subject-picker" id="subject-picker" style="margin-bottom:20px">
                <div style="font-weight:600;margin-bottom:10px;color:var(--text2);text-align:center">Выберите предмет</div>
                <div id="subject-btns" class="subject-grid"></div>
            </div>
            <div class="find-btn-wrap">
                <button class="btn btn-blue" id="find-btn" onclick="findGame()">Найти игру</button>
                <div id="search-timer-wrap" class="search-timer-wrap hidden">
                    <div class="search-timer-text">Поиск: <span id="search-timer-val">0:00</span></div>
                    <div class="search-avg">Среднее время подбора ~1:30</div>
                </div>
            </div>
            <div class="leaderboard" id="leaderboard">
                <h3>🏆 Топ-10 игроков</h3>
                <div id="lb-list"></div>
            </div>
            <div id="my-lb-card" class="my-lb-card hidden"></div>

            <div class="history-section" id="history-section">
                <h3>Последние игры</h3>
                <div id="history-list"><div style="text-align:center;color:var(--text3);padding:12px">Загрузка...</div></div>
            </div>

            <div style="margin-top:16px; display:flex; gap:10px;">
                <button class="btn btn-outline" style="flex:1" onclick="openStats()">Статистика</button>
                <button class="btn btn-outline" style="flex:1" onclick="logout()">Выйти</button>
            </div>
        </div>

        <!-- Stats Screen -->
        <div id="stats-screen" class="hidden">
            <div class="stats-header">
                <button class="stats-back" onclick="closeStats()">&larr; Назад</button>
                <h2>Статистика</h2>
            </div>
            <div id="stats-loading" style="text-align:center;color:var(--text3);padding:40px">Загрузка...</div>
            <div id="stats-content" class="hidden">
                <!-- Overview cards -->
                <div class="stats-cards" id="stats-cards"></div>

                <!-- Streaks -->
                <div class="stats-section" id="stats-streaks"></div>

                <!-- Weak/Strong topics -->
                <div class="stats-section" id="stats-weak"></div>
                <div class="stats-section" id="stats-strong"></div>

                <!-- Per-subject breakdown -->
                <div id="stats-subjects"></div>

                <!-- Topic tables -->
                <div id="stats-topics"></div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            <div class="game-header">
                <div class="round-info">Раунд <span id="g-round">1</span>/<span id="g-total">7</span></div>
                <div class="score-display">
                    <span class="score-me" id="g-my-score">0</span>
                    <span class="score-sep">:</span>
                    <span class="score-opp" id="g-opp-score">0</span>
                </div>
                <div class="round-info" id="g-opponent-name">Соперник</div>
            </div>

            <div class="timer-bar" id="timer-bar">
                Осталось: <span class="time" id="timer-value">5:00</span>
            </div>

            <div class="question-card" id="question-card"></div>

            <div class="answer-section" id="answer-section">
                <div id="digit-mode" class="hidden">
                    <div class="answer-display" id="digit-display">Выберите цифры</div>
                    <div class="digit-grid" id="digit-grid"></div>
                </div>
                <div id="text-mode" class="hidden">
                    <input type="text" class="text-input" id="text-input" placeholder="Введите ответ" autocomplete="off">
                </div>
                <button class="btn btn-green" id="submit-btn" onclick="submitAnswer()" disabled>Ответить</button>
            </div>

            <div class="feedback" id="feedback"></div>
        </div>

        <!-- Review overlay -->
        <div class="review-overlay" id="review-overlay">
            <div class="review-box">
                <div class="review-header">
                    <button class="review-close" onclick="closeReview()">&times;</button>
                    <h3 id="review-title">Обзор игры</h3>
                    <div class="review-nav">
                        <button class="review-nav-btn" id="review-prev" onclick="reviewNav(-1)">&larr;</button>
                        <span id="review-round-label">Раунд 1/7</span>
                        <button class="review-nav-btn" id="review-next" onclick="reviewNav(1)">&rarr;</button>
                    </div>
                </div>
                <div class="review-question" id="review-question"></div>
                <div class="review-answers" id="review-answers"></div>
                <div class="review-solution" id="review-solution"></div>
            </div>
        </div>

        <!-- Result overlay -->
        <div class="result-overlay" id="result-overlay">
            <div class="result-box">
                <div class="result-icon" id="r-icon"></div>
                <div class="result-title" id="r-title"></div>
                <div class="result-subtitle" id="r-subtitle"></div>
                <div class="result-stats">
                    <div class="result-stat">
                        <div class="val score-me" id="r-my-score">0</div>
                        <div class="label">Мой счёт</div>
                    </div>
                    <div class="result-stat">
                        <div class="val score-opp" id="r-opp-score">0</div>
                        <div class="label">Счёт соперника</div>
                    </div>
                </div>
                <div class="rating-change" id="r-rating"></div>
                <button class="btn btn-green" id="r-review-btn" onclick="openReviewFromResult()" style="margin-bottom:10px">Разбор заданий</button>
                <button class="btn btn-blue" onclick="backToDashboard()">На главную</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let authMode = 'login';
        let ws = null;
        let selectedDigits = new Set();
        let currentAnswerType = 'text';
        let answered = false;
        let timerInterval = null;
        let selectedSubject = 'rus';
        let lastGameId = null;
        let reviewData = [];
        let reviewIdx = 0;
        let searchTimerInterval = null;
        let searchStartTime = null;

        // ----- Screen management -----
        function showScreen(id) {
            ['auth-screen', 'dashboard', 'game-screen', 'stats-screen'].forEach(s => {
                document.getElementById(s).classList.toggle('hidden', s !== id);
            });
        }

        // ----- Auth -----
        function switchTab(mode) {
            authMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('auth-btn').textContent = mode === 'login' ? 'Войти' : 'Создать аккаунт';
            hideError();
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg; el.style.display = 'block';
        }
        function hideError() { document.getElementById('error-msg').style.display = 'none'; }

        async function doAuth() {
            hideError();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { showError('Заполните все поля'); return; }
            const url = authMode === 'login' ? '/api/login' : '/api/register';
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password}),
                });
                if (!res.ok) {
                    const data = await res.json();
                    showError(data.detail || 'Ошибка');
                    return;
                }
                currentUser = await res.json();
                localStorage.setItem('user', JSON.stringify(currentUser));
                showDashboard();
            } catch (e) { showError('Ошибка сети'); }
        }

        function logout() {
            localStorage.removeItem('user');
            currentUser = null;
            if (ws) { ws.close(); ws = null; }
            showScreen('auth-screen');
        }

        // ----- Dashboard -----
        async function showDashboard() {
            try {
                const res = await fetch(`/api/me/${currentUser.id}`);
                if (res.ok) { currentUser = {...currentUser, ...await res.json()}; }
            } catch {}
            document.getElementById('d-username').textContent = currentUser.username;
            document.getElementById('d-rating').textContent = currentUser.rating;
            document.getElementById('d-games').textContent = currentUser.games_played || 0;
            document.getElementById('d-wins').textContent = currentUser.games_won || 0;
            document.getElementById('find-btn').classList.remove('searching');
            document.getElementById('find-btn').textContent = 'Найти игру';
            stopSearchTimer();
            showScreen('dashboard');
            loadSubjects();
            loadLeaderboard();
            loadHistory();
        }

        async function loadSubjects() {
            try {
                const res = await fetch('/api/subjects');
                const data = await res.json();
                const el = document.getElementById('subject-btns');
                el.innerHTML = data.map(s => `<button class="subject-btn${s.key === selectedSubject ? ' selected' : ''}" data-key="${s.key}" onclick="pickSubject('${s.key}')">${esc(s.label)}</button>`).join('');
            } catch {}
        }

        function pickSubject(key) {
            selectedSubject = key;
            document.querySelectorAll('.subject-btn').forEach(b => {
                b.classList.toggle('selected', b.dataset.key === key);
            });
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();
                const el = document.getElementById('lb-list');
                if (!data.length) { el.innerHTML = '<div style="text-align:center;color:var(--text3);padding:12px">Пока пусто</div>'; return; }
                el.innerHTML = data.map((u, i) => {
                    const rc = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
                    const me = currentUser && u.id === currentUser.id ? ' style="background:var(--surface2)"' : '';
                    return `<div class="lb-row"${me}>
                        <div class="lb-rank ${rc}">${i+1}</div>
                        <div class="lb-name">${esc(u.username)}</div>
                        <div class="lb-rating">${u.rating}</div>
                    </div>`;
                }).join('');

                const card = document.getElementById('my-lb-card');
                if (currentUser) {
                    const myIdx = data.findIndex(u => u.id === currentUser.id);
                    const pos = myIdx >= 0 ? myIdx + 1 : '—';
                    card.classList.remove('hidden');
                    card.innerHTML = `<div class="lb-row" style="background:var(--surface2)">
                        <div class="lb-rank normal">${pos}</div>
                        <div class="lb-name">${esc(currentUser.username)}</div>
                        <div class="lb-rating">${currentUser.rating}</div>
                    </div>`;
                }
            } catch {}
        }

        // ----- WebSocket / Game -----
        function findGame() {
            const btn = document.getElementById('find-btn');
            if (btn.classList.contains('searching')) {
                if (ws) ws.send(JSON.stringify({type: 'cancel_search'}));
                btn.classList.remove('searching');
                btn.textContent = 'Найти игру';
                stopSearchTimer();
                return;
            }
            btn.classList.add('searching');
            btn.textContent = 'Отменить поиск';
            startSearchTimer();
            connectWS();
        }

        function startSearchTimer() {
            stopSearchTimer();
            searchStartTime = Date.now();
            document.getElementById('search-timer-wrap').classList.remove('hidden');
            document.getElementById('search-timer-val').textContent = '0:00';
            searchTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - searchStartTime) / 1000);
                const m = Math.floor(elapsed / 60);
                const s = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('search-timer-val').textContent = `${m}:${s}`;
            }, 1000);
        }

        function stopSearchTimer() {
            if (searchTimerInterval) { clearInterval(searchTimerInterval); searchTimerInterval = null; }
            document.getElementById('search-timer-wrap').classList.add('hidden');
        }

        function connectWS() {
            if (ws && ws.readyState <= 1) { ws.close(); }
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws/game`);

            ws.onopen = () => {
                ws.send(JSON.stringify({type: 'auth', user_id: currentUser.id}));
            };
            ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
            ws.onclose = () => {
                const btn = document.getElementById('find-btn');
                if (btn) { btn.classList.remove('searching'); btn.textContent = 'Найти игру'; }
                stopSearchTimer();
            };
        }

        let inGame = false;
        let disconnectTimer = null;

        function handleMessage(msg) {
            switch (msg.type) {
                case 'authenticated':
                    if (!inGame) ws.send(JSON.stringify({type: 'find_game', subject: selectedSubject}));
                    break;
                case 'searching':
                    break;
                case 'matched':
                    inGame = true;
                    stopSearchTimer();
                    document.getElementById('g-opponent-name').textContent = msg.opponent;
                    break;
                case 'round_start': startRound(msg); break;
                case 'answer_result': showMyResult(msg); break;
                case 'opponent_answered': showOpponentAnswered(msg); break;
                case 'round_end': showRoundEnd(msg); break;
                case 'game_over':
                    inGame = false;
                    clearDisconnectTimer();
                    showGameOver(msg);
                    break;
                case 'opponent_disconnected':
                    showDisconnectNotice(msg.timeout_seconds || 180);
                    break;
                case 'opponent_reconnected':
                    clearDisconnectTimer();
                    hideFeedbackNotice();
                    break;
                case 'reconnected':
                    inGame = true;
                    document.getElementById('g-opponent-name').textContent = msg.opponent;
                    document.getElementById('g-round').textContent = msg.round;
                    document.getElementById('g-my-score').textContent = msg.my_score;
                    document.getElementById('g-opp-score').textContent = msg.opponent_score;
                    showScreen('game-screen');
                    break;
                case 'search_cancelled':
                    document.getElementById('find-btn').classList.remove('searching');
                    document.getElementById('find-btn').textContent = 'Найти игру';
                    stopSearchTimer();
                    break;
            }
        }

        function showDisconnectNotice(seconds) {
            clearDisconnectTimer();
            let remaining = seconds;
            const fb = document.getElementById('feedback');
            fb.className = 'feedback';
            fb.style.display = 'block';
            fb.style.background = 'rgba(255,150,0,0.15)';
            fb.style.border = '2px solid var(--orange)';
            fb.style.color = 'var(--orange)';
            fb.innerHTML = `Соперник отключился. Победа через <b id="dc-timer">${formatTime(remaining)}</b>...`;
            disconnectTimer = setInterval(() => {
                remaining--;
                const el = document.getElementById('dc-timer');
                if (el) el.textContent = formatTime(remaining);
                if (remaining <= 0) clearDisconnectTimer();
            }, 1000);
        }

        function clearDisconnectTimer() {
            if (disconnectTimer) { clearInterval(disconnectTimer); disconnectTimer = null; }
        }

        function hideFeedbackNotice() {
            const fb = document.getElementById('feedback');
            fb.className = 'feedback'; fb.style.display = 'none';
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            return `${m}:${(s % 60).toString().padStart(2, '0')}`;
        }

        function startRound(msg) {
            answered = false;
            selectedDigits.clear();
            clearTimer();

            showScreen('game-screen');
            const fb = document.getElementById('feedback');
            fb.className = 'feedback'; fb.style.display = 'none';
            fb.removeAttribute('style');
            document.getElementById('timer-bar').classList.remove('active');

            document.getElementById('g-round').textContent = msg.round;
            document.getElementById('g-my-score').textContent = msg.my_score;
            document.getElementById('g-opp-score').textContent = msg.opponent_score;
            document.getElementById('question-card').innerHTML = msg.question_html || esc(msg.question_text);

            currentAnswerType = msg.answer_type;
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').textContent = 'Ответить';
            document.getElementById('answer-section').classList.remove('hidden');

            if (currentAnswerType === 'digits') {
                document.getElementById('digit-mode').classList.remove('hidden');
                document.getElementById('text-mode').classList.add('hidden');
                buildDigitGrid();
                document.getElementById('digit-display').textContent = 'Выберите цифры';
                document.getElementById('digit-display').classList.remove('has-value');
            } else {
                document.getElementById('digit-mode').classList.add('hidden');
                document.getElementById('text-mode').classList.remove('hidden');
                const inp = document.getElementById('text-input');
                inp.value = ''; inp.disabled = false; inp.focus();
            }
        }

        function buildDigitGrid() {
            const grid = document.getElementById('digit-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'digit-btn';
                btn.textContent = i;
                btn.onclick = () => toggleDigit(i, btn);
                grid.appendChild(btn);
            }
            const zero = document.createElement('button');
            zero.className = 'digit-btn';
            zero.textContent = '0';
            zero.onclick = () => toggleDigit(0, zero);
            grid.appendChild(zero);
        }

        function toggleDigit(n, btn) {
            if (answered) return;
            if (selectedDigits.has(n)) { selectedDigits.delete(n); btn.classList.remove('selected'); }
            else { selectedDigits.add(n); btn.classList.add('selected'); }
            const sorted = [...selectedDigits].sort((a,b)=>a-b);
            const display = document.getElementById('digit-display');
            if (sorted.length) {
                display.textContent = 'Ответ: ' + sorted.join('');
                display.classList.add('has-value');
                document.getElementById('submit-btn').disabled = false;
            } else {
                display.textContent = 'Выберите цифры';
                display.classList.remove('has-value');
                document.getElementById('submit-btn').disabled = true;
            }
        }

        function getAnswer() {
            if (currentAnswerType === 'digits') return [...selectedDigits].sort((a,b)=>a-b).join('');
            return document.getElementById('text-input').value.trim();
        }

        function submitAnswer() {
            const answer = getAnswer();
            if (!answer || answered) return;
            answered = true;
            ws.send(JSON.stringify({type: 'submit_answer', answer}));
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').textContent = 'Ожидание...';
            document.querySelectorAll('.digit-btn').forEach(b => b.disabled = true);
            document.getElementById('text-input').disabled = true;
        }

        function showMyResult(msg) {
            const fb = document.getElementById('feedback');
            if (msg.correct) { fb.className = 'feedback correct'; fb.innerHTML = '✓ Правильно!'; }
            else { fb.className = 'feedback wrong'; fb.innerHTML = `✗ Неправильно. Ответ: ${esc(msg.correct_answer)}`; }
        }

        function showOpponentAnswered(msg) {
            startTimer(msg.timer_seconds);
            const fb = document.getElementById('feedback');
            if (!answered) {
                fb.className = 'feedback';
                fb.style.display = 'block';
                fb.style.background = 'rgba(28,176,246,0.1)';
                fb.style.border = '2px solid var(--blue)';
                fb.style.color = 'var(--blue)';
                fb.innerHTML = 'Соперник дал ответ. Время пошло!';
            }
        }

        function startTimer(seconds) {
            clearTimer();
            let remaining = seconds;
            document.getElementById('timer-bar').classList.add('active');
            updateTimerDisplay(remaining);
            timerInterval = setInterval(() => {
                remaining--;
                updateTimerDisplay(remaining);
                if (remaining <= 0) clearTimer();
            }, 1000);
        }
        function updateTimerDisplay(s) {
            const m = Math.floor(s / 60);
            document.getElementById('timer-value').textContent = `${m}:${(s%60).toString().padStart(2,'0')}`;
        }
        function clearTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            document.getElementById('timer-bar').classList.remove('active');
        }

        function showRoundEnd(msg) {
            clearTimer();
            document.getElementById('g-my-score').textContent = msg.my_score;
            document.getElementById('g-opp-score').textContent = msg.opponent_score;
            document.getElementById('answer-section').classList.add('hidden');

            const fb = document.getElementById('feedback');
            const myText = msg.my_correct ? '✓ Вы решили' : '✗ Вы не решили';
            const oppText = msg.opponent_correct ? 'Соперник решил' : 'Соперник не решил';
            fb.className = 'feedback';
            fb.style.display = 'block';
            fb.style.background = 'rgba(28,176,246,0.1)';
            fb.style.border = '2px solid var(--blue)';
            fb.style.color = '#ffffff';
            fb.innerHTML = `${myText} &nbsp;|&nbsp; ${oppText}<br>Правильный ответ: <b>${esc(msg.correct_answer)}</b><br><small style="color:var(--text3)">Следующий раунд через 3 сек...</small>`;
        }

        function showGameOver(msg) {
            clearTimer();
            lastGameId = msg.game_id || null;
            document.getElementById('r-review-btn').style.display = lastGameId ? 'block' : 'none';
            document.getElementById('result-overlay').classList.add('active');
            document.getElementById('r-my-score').textContent = msg.my_score;
            document.getElementById('r-opp-score').textContent = msg.opponent_score;

            if (msg.winner === 'me') {
                document.getElementById('r-icon').textContent = '🏆';
                document.getElementById('r-title').textContent = 'Победа!';
                document.getElementById('r-title').style.color = 'var(--green)';
            } else if (msg.winner === 'opponent') {
                document.getElementById('r-icon').textContent = '😔';
                document.getElementById('r-title').textContent = 'Поражение';
                document.getElementById('r-title').style.color = 'var(--red)';
            } else {
                document.getElementById('r-icon').textContent = '🤝';
                document.getElementById('r-title').textContent = 'Ничья';
                document.getElementById('r-title').style.color = 'var(--text2)';
            }

            document.getElementById('r-subtitle').textContent = `Раундов: ${msg.total_rounds}`;
            const rEl = document.getElementById('r-rating');
            const ch = msg.rating_change;
            if (ch > 0) { rEl.textContent = `+${ch} рейтинга`; rEl.className = 'rating-change positive'; }
            else if (ch < 0) { rEl.textContent = `${ch} рейтинга`; rEl.className = 'rating-change negative'; }
            else { rEl.textContent = 'Рейтинг без изменений'; rEl.className = 'rating-change neutral'; }

            if (currentUser) {
                currentUser.rating = msg.new_rating;
                localStorage.setItem('user', JSON.stringify(currentUser));
            }
        }

        function backToDashboard() {
            inGame = false;
            clearDisconnectTimer();
            document.getElementById('result-overlay').classList.remove('active');
            if (ws) { ws.close(); ws = null; }
            showDashboard();
        }

        function esc(t) {
            const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML;
        }

        // ----- History -----
        async function loadHistory() {
            if (!currentUser) return;
            try {
                const res = await fetch(`/api/history/${currentUser.id}`);
                const games = await res.json();
                const el = document.getElementById('history-list');
                if (!games.length) {
                    el.innerHTML = '<div style="text-align:center;color:var(--text3);padding:12px">Игр пока нет</div>';
                    return;
                }
                el.innerHTML = games.map(g => {
                    const outcomeClass = g.outcome === 'win' ? 'h-win' : g.outcome === 'loss' ? 'h-loss' : 'h-draw';
                    const outcomeText = g.outcome === 'win' ? 'Победа' : g.outcome === 'loss' ? 'Поражение' : 'Ничья';
                    const d = new Date(g.created_at);
                    const dateStr = d.toLocaleDateString('ru-RU', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
                    return `<div class="history-row" onclick="openReview(${g.game_id})">
                        <div class="h-outcome ${outcomeClass}">${outcomeText}</div>
                        <div class="h-details">
                            <div class="h-opponent">vs ${esc(g.opponent)}</div>
                            <div class="h-meta">${esc(g.subject)} &bull; ${g.my_score}:${g.opponent_score} &bull; ${dateStr}</div>
                        </div>
                        <div class="h-arrow">&rsaquo;</div>
                    </div>`;
                }).join('');
            } catch {}
        }

        async function openReview(gameId) {
            if (!currentUser) return;
            try {
                const res = await fetch(`/api/game/${gameId}/review?user_id=${currentUser.id}`);
                reviewData = await res.json();
                if (!reviewData.length) return;
                reviewIdx = 0;
                renderReviewRound();
                document.getElementById('review-overlay').classList.add('active');
            } catch {}
        }

        function openReviewFromResult() {
            if (lastGameId) openReview(lastGameId);
        }

        function closeReview() {
            document.getElementById('review-overlay').classList.remove('active');
        }

        function reviewNav(dir) {
            reviewIdx = Math.max(0, Math.min(reviewData.length - 1, reviewIdx + dir));
            renderReviewRound();
        }

        function renderReviewRound() {
            const r = reviewData[reviewIdx];
            document.getElementById('review-round-label').textContent = `Раунд ${r.round}/${reviewData.length}`;
            document.getElementById('review-prev').disabled = reviewIdx === 0;
            document.getElementById('review-next').disabled = reviewIdx === reviewData.length - 1;
            document.getElementById('review-question').innerHTML = r.question_html || esc(r.question_text);

            const myAns = r.my_answer || '—';
            const oppAns = r.opponent_answer || '—';
            document.getElementById('review-answers').innerHTML = `
                <div class="ra-row">
                    <span class="ra-label">Ваш ответ:</span>
                    <span class="ra-value ${r.my_correct ? 'ra-correct' : 'ra-wrong'}">${esc(myAns)} ${r.my_correct ? '✓' : '✗'}</span>
                </div>
                <div class="ra-row">
                    <span class="ra-label">Ответ соперника:</span>
                    <span class="ra-value ${r.opponent_correct ? 'ra-correct' : 'ra-wrong'}">${esc(oppAns)} ${r.opponent_correct ? '✓' : '✗'}</span>
                </div>
                <div class="ra-row">
                    <span class="ra-label">Правильный ответ:</span>
                    <span class="ra-value ra-answer">${esc(r.correct_answer)}</span>
                </div>`;

            const solEl = document.getElementById('review-solution');
            if (r.solution_html) {
                solEl.innerHTML = '<div class="sol-title">Решение</div>' + r.solution_html;
                solEl.style.display = 'block';
            } else {
                solEl.style.display = 'none';
            }
        }

        // ----- Stats -----
        async function openStats() {
            showScreen('stats-screen');
            document.getElementById('stats-loading').classList.remove('hidden');
            document.getElementById('stats-content').classList.add('hidden');
            try {
                const res = await fetch(`/api/stats/${currentUser.id}`);
                const s = await res.json();
                renderStats(s);
                document.getElementById('stats-loading').classList.add('hidden');
                document.getElementById('stats-content').classList.remove('hidden');
            } catch {
                document.getElementById('stats-loading').textContent = 'Ошибка загрузки';
            }
        }

        function closeStats() { showDashboard(); }

        function fmtTime(ms) {
            if (!ms) return '—';
            const sec = Math.round(ms / 1000);
            if (sec < 60) return sec + ' сек';
            return Math.floor(sec / 60) + ':' + (sec % 60).toString().padStart(2, '0');
        }

        function pctBar(pct, color) {
            return `<div class="pct-bar"><div class="pct-fill" style="width:${pct}%;background:${color}"></div></div>`;
        }

        function renderStats(s) {
            // Overview cards
            document.getElementById('stats-cards').innerHTML = `
                <div class="stat-card">
                    <div class="sc-val sc-yellow">${s.rating}</div>
                    <div class="sc-label">Рейтинг</div>
                </div>
                <div class="stat-card">
                    <div class="sc-val">${s.games_played}</div>
                    <div class="sc-label">Игр сыграно</div>
                </div>
                <div class="stat-card">
                    <div class="sc-val sc-green">${s.win_pct}%</div>
                    <div class="sc-label">Побед</div>
                </div>
                <div class="stat-card">
                    <div class="sc-val">${s.total_correct}<small style="color:var(--text3)">/${s.total_answered}</small></div>
                    <div class="sc-label">Решено верно</div>
                </div>
                <div class="stat-card">
                    <div class="sc-val sc-blue">${s.solve_pct}%</div>
                    <div class="sc-label">Общий % решения</div>
                </div>
                <div class="stat-card">
                    <div class="sc-val">${fmtTime(s.avg_time_ms)}</div>
                    <div class="sc-label">Среднее время</div>
                </div>
            `;

            // Streaks + speed trend
            const speedTrend = s.avg_time_ms && s.recent_avg_time_ms
                ? (s.recent_avg_time_ms < s.avg_time_ms
                    ? `<span style="color:var(--green)">↑ Вы ускоряетесь!</span> Последние: ${fmtTime(s.recent_avg_time_ms)} vs общее: ${fmtTime(s.avg_time_ms)}`
                    : s.recent_avg_time_ms > s.avg_time_ms
                    ? `<span style="color:var(--orange)">↓ Стали медленнее.</span> Последние: ${fmtTime(s.recent_avg_time_ms)} vs общее: ${fmtTime(s.avg_time_ms)}`
                    : `Стабильная скорость: ${fmtTime(s.avg_time_ms)}`)
                : '';
            document.getElementById('stats-streaks').innerHTML = `
                <div class="ss-title">Серия побед</div>
                <div class="ss-row">
                    <span>Текущая серия: <b>${s.current_streak}</b></span>
                    <span>Лучшая серия: <b style="color:var(--yellow)">${s.best_streak}</b></span>
                </div>
                ${speedTrend ? `<div class="ss-trend">${speedTrend}</div>` : ''}
            `;

            // Weak topics
            const weakEl = document.getElementById('stats-weak');
            if (s.weak_topics.length) {
                weakEl.innerHTML = `<div class="ss-title" style="color:var(--red)">Слабые темы</div>` +
                    s.weak_topics.map(t => `<div class="topic-mini">
                        <span class="tm-name">${esc(t.subject)} — ${esc(t.label)}</span>
                        <span class="tm-pct" style="color:var(--red)">${t.percent}%</span>
                        ${pctBar(t.percent, 'var(--red)')}
                    </div>`).join('');
            } else { weakEl.innerHTML = ''; }

            // Strong topics
            const strongEl = document.getElementById('stats-strong');
            if (s.strong_topics.length) {
                strongEl.innerHTML = `<div class="ss-title" style="color:var(--green)">Сильные темы</div>` +
                    s.strong_topics.map(t => `<div class="topic-mini">
                        <span class="tm-name">${esc(t.subject)} — ${esc(t.label)}</span>
                        <span class="tm-pct" style="color:var(--green)">${t.percent}%</span>
                        ${pctBar(t.percent, 'var(--green)')}
                    </div>`).join('');
            } else { strongEl.innerHTML = ''; }

            // Per-subject overview
            const subjEl = document.getElementById('stats-subjects');
            if (s.subjects.length) {
                subjEl.innerHTML = `<div class="stats-section"><div class="ss-title">По предметам</div>` +
                    s.subjects.map(sub => `<div class="subj-stat-row">
                        <div class="ssr-name">${esc(sub.label)}</div>
                        <div class="ssr-details">
                            <span>Игр: ${sub.games}</span>
                            <span>Побед: ${sub.win_pct}%</span>
                            <span>Решений: ${sub.solve_pct}%</span>
                        </div>
                        ${pctBar(sub.solve_pct, 'var(--blue)')}
                    </div>`).join('') + `</div>`;
            } else { subjEl.innerHTML = ''; }

            // Topic tables per subject
            const topicsEl = document.getElementById('stats-topics');
            let html = '';
            for (const [subj, data] of Object.entries(s.topics_by_subject)) {
                if (!data.topics.length) continue;
                html += `<div class="stats-section">
                    <div class="ss-title">${esc(data.label)} — по заданиям</div>
                    <div class="topic-table">
                        <div class="tt-header">
                            <span class="tt-col-name">Задание</span>
                            <span class="tt-col">Решено</span>
                            <span class="tt-col">%</span>
                            <span class="tt-col">Время</span>
                        </div>`;
                for (const t of data.topics) {
                    const barColor = t.percent >= 70 ? 'var(--green)' : t.percent >= 40 ? 'var(--orange)' : 'var(--red)';
                    html += `<div class="tt-row">
                        <span class="tt-col-name">${esc(t.label)}</span>
                        <span class="tt-col">${t.correct}/${t.total}</span>
                        <span class="tt-col" style="color:${barColor};font-weight:700">${t.percent}%</span>
                        <span class="tt-col">${fmtTime(t.avg_time_ms)}</span>
                    </div>`;
                }
                html += `</div></div>`;
            }
            topicsEl.innerHTML = html;
        }

        // ----- Text input listeners -----
        document.getElementById('text-input').addEventListener('input', () => {
            document.getElementById('submit-btn').disabled = !document.getElementById('text-input').value.trim();
        });
        document.getElementById('text-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitAnswer();
        });
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') doAuth();
        });

        // ----- Init -----
        const saved = localStorage.getItem('user');
        if (saved) { currentUser = JSON.parse(saved); showDashboard(); }
    </script>
</body>
</html>
